<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="LibVerde">
  <!-- Bandeja crema del icono original -->
  <rect width="64" height="64" rx="14" fill="#f4ebdb" />

  <!-- Marcapáginas naranja, asomando por debajo -->
  <path d="M20 48h9v12l-4.5-3.4L20 60V48Z" fill="#e0642a" />

  <!-- Cuaderno -->
  <rect x="9" y="5" width="46" height="52" rx="4" fill="#37804c" />
  <!-- Lomo, un punto más oscuro -->
  <path d="M13 5h4v52h-4a4 4 0 0 1-4-4V9a4 4 0 0 1 4-4Z" fill="#2a6a3d" />
  <!-- Goma elástica -->
  <rect x="45" y="5" width="4" height="52" fill="#6b4a2e" />

  <!-- Átomo en la portada -->
  <g transform="translate(30.5 31)" fill="none" stroke="#f4ebdb" stroke-width="2">
    <ellipse rx="13" ry="5.2" />
    <ellipse rx="13" ry="5.2" transform="rotate(60)" />
    <ellipse rx="13" ry="5.2" transform="rotate(120)" />
  </g>
  <g fill="#f4ebdb">
    <circle cx="30.5" cy="31" r="3" />
    <circle cx="17.5" cy="31" r="1.7" />
    <circle cx="43.5" cy="31" r="1.7" />
    <circle cx="24" cy="19.7" r="1.7" />
    <circle cx="37" cy="42.3" r="1.7" />
    <circle cx="24" cy="42.3" r="1.7" />
    <circle cx="37" cy="19.7" r="1.7" />
  </g>
</svg>
